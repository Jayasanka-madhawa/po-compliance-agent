services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: po_user
      POSTGRES_PASSWORD: po_pass
      POSTGRES_DB: po_compliance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U po_user -d po_compliance"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  streamlit:
    build: .
    command: >
      streamlit run streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.fileWatcherType=none
      --browser.gatherUsageStats=false
    ports:
      - "8502:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./.streamlit/config.toml:/app/.streamlit/config.toml
      - ./knowledge_base:/app/knowledge_base:ro
    depends_on:
      - api
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Colombo
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./sample_documents:/home/node/.n8n-files/sample_documents:ro
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  n8n_data:
